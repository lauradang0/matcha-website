<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matcha map — Laura's Matcha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="map-page">

  <header class="map-page-header">
    <a href="index.html" class="map-page-back">← Laura's Matcha</a>
    <h1 class="map-page-title">favorite spots</h1>
    <p class="map-page-lede">tap a pin — curated matcha around the world</p>
    <button type="button" class="add-entry-btn add-entry-btn--header" data-open-add-cafe>+ Add cafe</button>
  </header>

  <div class="map-wrap" style="position:relative">
    <div id="map" role="application" aria-label="Map of matcha places"></div>

    <aside
      class="matcha-detail-card"
      id="matcha-detail-card"
      aria-hidden="true"
      hidden
    >
      <div class="matcha-detail-card__handle" aria-hidden="true"></div>
        <button type="button" class="matcha-detail-card__close" aria-label="Close detail">×</button>
        <p class="matcha-detail-card__eyebrow" id="matcha-detail-eyebrow"></p>
        <h2 class="matcha-detail-card__name" id="matcha-detail-name"></h2>
        <p class="matcha-detail-card__tagline" id="matcha-detail-tagline"></p>
        <div class="matcha-detail-card__divider" aria-hidden="true"></div>
      <div class="matcha-detail-card__stars" id="matcha-detail-stars"></div>
      <p class="matcha-detail-card__note" id="matcha-detail-note"></p>
      <p class="matcha-detail-card__signature" id="matcha-detail-signature" hidden></p>
    </aside>
  </div>

  <div id="add-cafe-modal" class="form-modal" hidden role="dialog" aria-modal="true" aria-labelledby="add-cafe-title">
    <div class="form-modal__backdrop" aria-hidden="true" data-close-add-cafe></div>
    <div class="form-modal__panel form-modal__panel--wide">
      <button type="button" class="form-modal__close" data-close-add-cafe aria-label="Close">×</button>
      <h2 id="add-cafe-title" class="form-modal__title">Add a cafe</h2>
      <p class="form-modal__hint">Saved on this browser only — paste latitude &amp; longitude from Google Maps.</p>
      <form id="add-cafe-form">
        <label class="form-field"><span class="form-field__label">Cafe name</span><input name="cafe_name" type="text" required autocomplete="off" /></label>
        <div class="form-row">
          <label class="form-field"><span class="form-field__label">City</span><input name="cafe_city" type="text" required autocomplete="address-level2" /></label>
          <label class="form-field"><span class="form-field__label">Country</span><input name="cafe_country" type="text" placeholder="Japan" autocomplete="country-name" /></label>
        </div>
        <div class="form-row">
          <label class="form-field"><span class="form-field__label">Latitude</span><input name="cafe_lat" type="text" inputmode="decimal" required placeholder="35.0116" /></label>
          <label class="form-field"><span class="form-field__label">Longitude</span><input name="cafe_lng" type="text" inputmode="decimal" required placeholder="135.7681" /></label>
        </div>
        <label class="form-field"><span class="form-field__label">Rating (0–5)</span><input name="cafe_rating" type="number" min="0" max="5" step="0.5" value="4.5" /></label>
        <label class="form-field"><span class="form-field__label">Map tagline</span><input name="cafe_tagline" type="text" placeholder="e.g. best ceremonial latte" autocomplete="off" /></label>
        <label class="form-field"><span class="form-field__label">Pin art</span>
          <select name="cafe_icon">
            <option value="">Rotate (cup → latte → bowl)</option>
            <option value="pin-cup">Matcha cup</option>
            <option value="pin-latte">Iced matcha latte</option>
            <option value="pin-bowl">Bowl &amp; whisk</option>
          </select>
        </label>
        <label class="form-field"><span class="form-field__label">Your note</span><textarea name="cafe_note" rows="3" placeholder="What did you love?"></textarea></label>
        <label class="form-field"><span class="form-field__label">Signature drink (optional)</span><input name="cafe_signature" type="text" autocomplete="off" /></label>
        <button type="submit" class="form-modal__submit">Save cafe</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="matchas.js"></script>
  <script src="user-matcha.js"></script>
  <script src="matcha-ui.js"></script>
  <script src="map.js"></script>
  <script src="add-cafe.js"></script>
</body>
</html>
