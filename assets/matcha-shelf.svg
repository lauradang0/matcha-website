<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="520" height="400" role="img" aria-labelledby="shelfTitle shelfDesc">
  <title id="shelfTitle">Matcha collection shelf</title>
  <desc id="shelfDesc">Illustration of a wooden shelf with matcha tins, a tea bowl, and a bamboo whisk.</desc>
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF5E6"/>
      <stop offset="100%" stop-color="#F4ECD8"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A8267"/>
      <stop offset="35%" stop-color="#C4A882"/>
      <stop offset="70%" stop-color="#A08C6E"/>
      <stop offset="100%" stop-color="#8B7355"/>
    </linearGradient>
    <linearGradient id="tinBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7FA363"/>
      <stop offset="100%" stop-color="#5C7A45"/>
    </linearGradient>
    <linearGradient id="tinGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D4A8"/>
      <stop offset="100%" stop-color="#C9A962"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#5C4A32" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Wall -->
  <rect width="520" height="400" fill="url(#wall)"/>
  <ellipse cx="70" cy="70" rx="120" ry="80" fill="rgba(180,160,110,0.12)"/>
  <ellipse cx="460" cy="320" rx="100" ry="70" fill="rgba(180,160,110,0.1)"/>

  <!-- Shadow under shelf -->
  <ellipse cx="260" cy="268" rx="210" ry="14" fill="rgba(92,74,50,0.12)"/>

  <!-- Shelf board -->
  <path filter="url(#softShadow)" d="M60 248 L460 248 L448 262 L52 262 Z" fill="url(#wood)" stroke="#5C4A32" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="52" y="262" width="396" height="8" rx="1" fill="#7A654F" opacity="0.9"/>

  <!-- Tiny bracket hints -->
  <path d="M120 248 L120 220 M120 220 Q120 210 130 210 L390 210 Q400 210 400 220 L400 248" fill="none" stroke="#A08C6E" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Left tin (tall) -->
  <g filter="url(#softShadow)">
    <rect x="82" y="152" width="56" height="96" rx="3" fill="url(#tinBody)" stroke="#5C4A32" stroke-width="1.2" stroke-opacity="0.4"/>
    <rect x="85" y="148" width="50" height="10" rx="2" fill="url(#tinGold)" stroke="#5C4A32" stroke-width="0.8" stroke-opacity="0.35"/>
    <rect x="98" y="170" width="24" height="3" rx="1" fill="rgba(250,245,230,0.5)"/>
    <rect x="98" y="196" width="24" height="3" rx="1" fill="rgba(250,245,230,0.35)"/>
  </g>

  <!-- Center chawan -->
  <g filter="url(#softShadow)">
    <ellipse cx="258" cy="242" rx="38" ry="10" fill="#5C4A32" opacity="0.15"/>
    <path d="M220 220 Q220 248 258 252 Q296 248 296 220 Q296 196 258 192 Q220 196 220 220" fill="#FAF5E6" stroke="#A08C6E" stroke-width="1.5"/>
    <ellipse cx="258" cy="200" rx="22" ry="8" fill="none" stroke="#6B8E4E" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <!-- Chasen -->
  <g filter="url(#softShadow)">
    <path d="M332 246 L332 175" stroke="#C4A574" stroke-width="4" stroke-linecap="round"/>
    <path d="M332 175 L318 138 M332 175 L326 132 M332 175 L334 128 M332 175 L342 132 M332 175 L348 140" stroke="#E8DCC4" stroke-width="1.8" stroke-linecap="round" opacity="0.95"/>
    <ellipse cx="332" cy="248" rx="8" ry="4" fill="#C4A574" opacity="0.6"/>
  </g>

  <!-- Right short tin (dusty rose + gold) -->
  <g filter="url(#softShadow)">
    <rect x="358" y="178" width="62" height="70" rx="3" fill="#C9A896" stroke="#5C4A32" stroke-width="1.2" stroke-opacity="0.35"/>
    <rect x="362" y="174" width="54" height="9" rx="2" fill="url(#tinGold)" stroke="#5C4A32" stroke-width="0.8" stroke-opacity="0.3"/>
    <circle cx="389" cy="210" r="10" fill="none" stroke="#FAF5E6" stroke-width="1.5" stroke-opacity="0.7"/>
  </g>

  <!-- Small ceramic rabbit (cute accent) -->
  <g opacity="0.92" filter="url(#softShadow)">
    <ellipse cx="198" cy="244" rx="14" ry="8" fill="#E8DDD0" stroke="#A08C6E" stroke-width="1"/>
    <circle cx="198" cy="228" r="12" fill="#FAF5E6" stroke="#A08C6E" stroke-width="1"/>
    <ellipse cx="192" cy="218" rx="3" ry="9" fill="#FAF5E6" stroke="#A08C6E" stroke-width="0.8" transform="rotate(-15 192 218)"/>
    <ellipse cx="204" cy="218" rx="3" ry="9" fill="#FAF5E6" stroke="#A08C6E" stroke-width="0.8" transform="rotate(15 204 218)"/>
    <circle cx="194" cy="230" r="1.5" fill="#5C4A32"/>
    <circle cx="202" cy="230" r="1.5" fill="#5C4A32"/>
  </g>

  <!-- Foreground matcha scoop / small tin -->
  <g filter="url(#softShadow)">
    <rect x="288" y="198" width="34" height="50" rx="2" fill="#6B8E4E" stroke="#5C4A32" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="291" y="194" width="28" height="7" rx="1" fill="#E8D4A8" stroke="#5C4A32" stroke-width="0.6" stroke-opacity="0.3"/>
  </g>
</svg>
