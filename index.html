<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura's Matcha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=Inter:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── SECTION 1: SPLASH ── -->
  <section class="splash">
    <div class="bg-photo"></div>
    <div class="bubbles" id="bubbles"></div>
    <div class="content">
      <div class="title-row">
        <span class="title-laura">LAURA</span>
        <span class="title-jp">ローラ</span>
      </div>
      <div class="subtitle-row">
        <span>MATCHA</span>
        <span>2024</span>
        <span class="subtitle-jp">抹茶レビュー</span>
      </div>
    </div>
    <div class="scroll-hint">scroll ↓</div>
  </section>

  <!-- ── SECTION 2: COLLECTION ── -->
  <section class="collection">
    <p class="collection-eyebrow">a little corner of the internet</p>
    <h2 class="collection-title">My Matcha Collection</h2>
    <p class="collection-sub">every tin i've ever loved, rated & reviewed</p>

    <a href="reviews.html" class="shelf-link" aria-label="Explore the collection">
      <img
        src="assets/matcha-shelf.png"
        alt="Matcha shelf with tins, chasen, and cute figurines"
        class="shelf-img"
      />
      <div class="shelf-cta">
        <span>explore the collection ↗</span>
      </div>
    </a>
  </section>

  <!-- ── SECTION 3: MAP ── -->
  <section class="map">
    <div class="map-headings">
      <p class="map-eyebrow">from kyoto to brooklyn</p>
      <h2 class="map-title">Places I've Sipped</h2>
      <p class="map-sub">every cafe that earned a spot on the list</p>
    </div>
    <div class="map-wrap">
      <div id="map" role="application" aria-label="Map of matcha places"></div>
      <aside
        class="matcha-detail-card"
        id="matcha-detail-card"
        aria-hidden="true"
        hidden
      >
        <div class="matcha-detail-card__handle" aria-hidden="true"></div>
        <button type="button" class="matcha-detail-card__close" aria-label="Close detail">×</button>
        <p class="matcha-detail-card__eyebrow" id="matcha-detail-eyebrow"></p>
        <h2 class="matcha-detail-card__name" id="matcha-detail-name"></h2>
        <div class="matcha-detail-card__divider" aria-hidden="true"></div>
        <div class="matcha-detail-card__stars" id="matcha-detail-stars"></div>
        <p class="matcha-detail-card__note" id="matcha-detail-note"></p>
        <p class="matcha-detail-card__signature" id="matcha-detail-signature" hidden></p>
      </aside>
    </div>
    <p class="map-full-link"><a href="map.html">open full map ↗</a></p>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="matchas.js"></script>
  <script src="map.js"></script>
  <script src="bubbles.js"></script>
</body>
</html>
